<style>

<script>

// ─── UTILS ───────────────────────────────────────────────
var DAYS_RU = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
var MONTHS_RU = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function formatTime(h, m) { return pad(h) + ':' + pad(m); }

// ─── CLOCK ───────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  document.getElementById('clock-time').innerHTML =
    pad(h) + '<span class="colon">:</span>' + pad(m);
  document.getElementById('clock-date').textContent =
    DAYS_RU[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS_RU[now.getMonth()] + ' ' + now.getFullYear();
}

setInterval(updateClock, 1000);
updateClock();

// ─── WEATHER ─────────────────────────────────────────────


// ── WEATHER DATA (injected by GitHub Actions) ──
var WEATHER_DATA = {
  temp: '10',
  feels: '7',
  humidity: '53',
  wind: '17',
  code: 3,
  updatedAt: '06.04 03:55',
  forecast: [{"label": "Сейчас", "temp": 11, "code": 3}, {"label": "04:00", "temp": 10, "code": 3}, {"label": "05:00", "temp": 9, "code": 3}, {"label": "06:00", "temp": 9, "code": 3}, {"label": "07:00", "temp": 8, "code": 3}, {"label": "08:00", "temp": 8, "code": 3}]
};
// ── END WEATHER DATA ──

function renderWeather() {
  var d = WEATHER_DATA;
  var WMO_ICONS_LOCAL = {
    0:'☀️',1:'🌤',2:'⛅',3:'☁️',
    45:'🌫',48:'🌫',
    51:'🌦',53:'🌦',55:'🌧',
    61:'🌧',63:'🌧',65:'🌧',
    71:'❄️',73:'❄️',75:'❄️',77:'🌨',
    80:'🌦',81:'🌧',82:'⛈',
    85:'🌨',86:'🌨',
    95:'⛈',96:'⛈',99:'⛈'
  };
  var WMO_DESC_LOCAL = {
    0:'Ясно',1:'Преимущественно ясно',2:'Переменная облачность',3:'Облачно',
    45:'Туман',48:'Иней',
    51:'Лёгкая морось',53:'Морось',55:'Сильная морось',
    61:'Небольшой дождь',63:'Дождь',65:'Сильный дождь',
    71:'Небольшой снег',73:'Снег',75:'Сильный снег',77:'Снежная крупа',
    80:'Ливень',81:'Ливень',82:'Сильный ливень',
    85:'Снежный ливень',86:'Снежный ливень',
    95:'Гроза',96:'Гроза с градом',99:'Сильная гроза'
  };

  var icon = WMO_ICONS_LOCAL[d.code] || '🌡';
  var desc = WMO_DESC_LOCAL[d.code] || '—';

  var forecastHtml = '';
  for (var i = 0; i < d.forecast.length; i++) {
    var s = d.forecast[i];
    var hIcon = WMO_ICONS_LOCAL[s.code] || '🌡';
    forecastHtml +=
      '<div class="fc-slot">' +
        '<div class="fc-label">' + s.label + '</div>' +
        '<div class="fc-icon">' + hIcon + '</div>' +
        '<div class="fc-temp">' + s.temp + '°</div>' +
      '</div>';
  }

  document.getElementById('weather-content').innerHTML =
    '<div class="weather-main">' +
      '<div>' +
        '<div class="weather-temp">' + d.temp + '<sup>°C</sup></div>' +
        '<div class="weather-desc">' + desc + '</div>' +
      '</div>' +
      '<div class="weather-icon">' + icon + '</div>' +
    '</div>' +
    '<div class="weather-details">' +
      '<div class="weather-detail">Влажность <span>' + d.humidity + '</span>%</div>' +
      '<div class="weather-detail">Ветер <span>' + d.wind + '</span> км/ч</div>' +
      '<div class="weather-detail">Ощущается <span>' + d.feels + '</span>°</div>' +
    '</div>' +
    '<div class="forecast-strip">' + forecastHtml + '</div>' +
    '<div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:8px;text-align:right">обновлено ' + d.updatedAt + '</div>';
}

renderWeather();

// ─── BUS SCHEDULE ─────────────────────────────────────────
// Static schedule: route 161 and 312 from Škola Nebušice toward Bořislavka
// Weekday schedule (approximate, update as needed)
var BUS_SCHEDULE = {
  161: {
    weekday: [6,0, 6,30, 7,0, 7,15, 7,30, 7,45, 8,0, 8,15, 8,30, 8,45,
              9,0, 9,30, 10,0, 10,30, 11,0, 11,30, 12,0, 12,30,
              13,0, 13,30, 14,0, 14,15, 14,30, 14,45, 15,0, 15,15, 15,30, 15,45,
              16,0, 16,30, 17,0, 17,30, 18,0, 18,30, 19,0, 19,30, 20,0, 20,30],
    weekend: [7,0, 8,0, 9,0, 10,0, 11,0, 12,0, 13,0, 14,0, 15,0, 16,0, 17,0, 18,0, 19,0, 20,0]
  },
  312: {
    weekday: [6,15, 6,45, 7,10, 7,25, 7,40, 7,55, 8,10, 8,25, 8,45,
              9,15, 9,45, 10,15, 10,45, 11,15, 11,45, 12,15, 12,45,
              13,15, 13,45, 14,10, 14,25, 14,40, 14,55, 15,10, 15,25, 15,40, 15,55,
              16,15, 16,45, 17,15, 17,45, 18,15, 18,45, 19,15, 19,45, 20,15],
    weekend: [7,30, 8,30, 9,30, 10,30, 11,30, 12,30, 13,30, 14,30, 15,30, 16,30, 17,30, 18,30, 19,30]
  }
};

function getNextBusTimes(route, count) {
  var now = new Date();
  var isWeekend = now.getDay() === 0 || now.getDay() === 6;
  var arr = isWeekend ? BUS_SCHEDULE[route].weekend : BUS_SCHEDULE[route].weekday;
  var nowMin = now.getHours() * 60 + now.getMinutes();
  var results = [];
  for (var i = 0; i < arr.length - 1; i += 2) {
    var depMin = arr[i] * 60 + arr[i+1];
    if (depMin >= nowMin && results.length < count) {
      results.push({ h: arr[i], m: arr[i+1], diff: depMin - nowMin });
    }
  }
  return results;
}

function renderBusTimes(routeNum, elementId) {
  var times = getNextBusTimes(routeNum, 3);
  var el = document.getElementById(elementId);
  var nextEl = document.getElementById('next-' + routeNum);
  if (!el) return;
  var html = '';

  if (nextEl) {
    if (times.length === 0) {
      nextEl.className = 'bus-next';
      nextEl.textContent = 'нет рейсов';
    } else {
      var first = times[0];
      var ncls = 'bus-next';
      if (first.diff <= 5) ncls += ' very-soon';
      else if (first.diff <= 15) ncls += ' soon';
      nextEl.className = ncls;
      nextEl.textContent = first.diff === 0 ? 'сейчас' : 'через ' + first.diff + ' мин';
    }
  }

  if (times.length === 0) {
    html = '<span class="bus-time" style="color:rgba(255,255,255,0.2)">—</span>';
  } else {
    for (var i = 0; i < times.length; i++) {
      var t = times[i];
      var tcls = 'bus-time';
      if (t.diff <= 5) tcls += ' very-soon';
      else if (t.diff <= 15) tcls += ' soon';
      html += '<div class="' + tcls + '"><span class="bus-hhmm">' + formatTime(t.h, t.m) + '</span></div>';
    }
  }
  el.innerHTML = html;
}

function toDateStr(date) {
  return date.getFullYear() + '-' +
    pad(date.getMonth() + 1) + '-' +
    pad(date.getDate());
}

function getEventsForDate(dateStr) {
  var result = [];
  for (var i = 0; i < ALISA_EVENTS.length; i++) {
    if (ALISA_EVENTS[i].date === dateStr) result.push(ALISA_EVENTS[i]);
  }
  // sort by start time
  result.sort(function(a, b) {
    var as = a.start || '00:00';
    var bs = b.start || '00:00';
    return as < bs ? -1 : 1;
  });
  return result;
}

function renderSchedule() {
  var now = new Date();
  var todayStr = toDateStr(now);
  var tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
  var tomorrowStr = toDateStr(tomorrow);

  var nowMin = now.getHours() * 60 + now.getMinutes();

  // TODAY
  var todayEvents = getEventsForDate(todayStr);
  var todayEl = document.getElementById('schedule-today');
  var html = '<div class="schedule-day-label">Сегодня</div>';

  if (todayEvents.length === 0) {
    html += '<div class="schedule-empty">Нет событий</div>';
  } else {
    for (var i = 0; i < todayEvents.length; i++) {
      var ev = todayEvents[i];
      var cls = 'schedule-item';
      var timeLabel = '';

      if (ev.start) {
        var parts = ev.start.split(':');
        var evMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        var endParts = ev.end ? ev.end.split(':') : null;
        var evEnd = endParts ? parseInt(endParts[0]) * 60 + parseInt(endParts[1]) : evMin + 60;

        if (nowMin > evEnd) cls += ' past';
        else if (nowMin >= evMin) cls += ' current';

        timeLabel = ev.start + (ev.end ? '–' + ev.end : '');
      } else {
        timeLabel = 'весь день';
      }

      html += '<div class="' + cls + '">' +
        '<div class="schedule-dot"></div>' +
        '<div class="schedule-time">' + timeLabel + '</div>' +
        '<div class="schedule-title">' + ev.title + '</div>' +
        '</div>';
    }
  }
  todayEl.innerHTML = html;

  // TOMORROW
  var tomorrowEvents = getEventsForDate(tomorrowStr);
  var tomEl = document.getElementById('schedule-tomorrow');
  var thtml = '<div class="schedule-day-label">Завтра · ' +
    DAYS_RU[tomorrow.getDay()] + '</div>';

  if (tomorrowEvents.length === 0) {
    thtml += '<div class="schedule-empty">Нет событий</div>';
  } else {
    for (var j = 0; j < tomorrowEvents.length; j++) {
      var tev = tomorrowEvents[j];
      var tlabel = tev.start ? (tev.start + (tev.end ? '–' + tev.end : '')) : 'весь день';
      thtml += '<div class="schedule-item">' +
        '<div class="schedule-dot"></div>' +
        '<div class="schedule-time">' + tlabel + '</div>' +
        '<div class="schedule-title">' + tev.title + '</div>' +
        '</div>';
    }
  }
  tomEl.innerHTML = thtml;
}
