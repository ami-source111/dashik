* { -webkit-box-sizing: border-box; box-sizing: border-box; margin: 0; padding: 0; }

html, body {

.page {
  position: relative; z-index: 1;

}

  -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between;

  -webkit-flex-shrink: 0; flex-shrink: 0;
}

.clock-date {
  font-size: 20px; color: rgba(255,255,255,0.92);
  letter-spacing: 3px; text-transform: uppercase;
}

.status-row {
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  gap: 6px; font-size: 11px; color: rgba(255,255,255,0.45);

}

.status-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(93,204,136,0.5); }


.clock-time {

}
.clock-time .colon { -webkit-animation: blink 1s step-end infinite; animation: blink 1s step-end infinite; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

/* Body: left narrow + right wide */
.body {

}

/* LEFT column: buses + quote */
.col-left {
  width: 300px; -webkit-flex-shrink: 0; flex-shrink: 0;

}

/* RIGHT column: weather top + schedule bottom */
.col-right {

.card {

/* ─── WEATHER ─── */

.weather-details { display:-webkit-box; display:-webkit-flex; display:flex; gap:12px; margin-top:5px; }
.weather-detail { font-size: 13px; color: rgba(255,255,255,0.65); }

.forecast-strip {

.weather-tomorrow { font-size:13px; color:rgba(255,255,255,0.6); margin-top:6px; }
.weather-updated { font-size:11px; color:rgba(255,255,255,0.4); margin-top:4px; text-align:right; }

/* ─── BUSES ─── */
.bus-row {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-align:center; -webkit-align-items:center; align-items:center;

.bus-badge {

.bus-times { display:-webkit-box; display:-webkit-flex; display:flex; gap:4px; }
.bus-time {

.bus-hhmm { display:block; font-size:12px; font-weight:400; line-height:1.2; }
.bus-time.soon { color:#ff9444; background:rgba(255,148,68,0.12); }
.bus-time.very-soon { color:#ff4444; background:rgba(255,68,68,0.12); }
.bus-updated { font-size:11px; color:rgba(255,255,255,0.4); margin-top:4px; text-align:right; }

/* ─── QUOTE ─── */
.quote-header {
  display:-webkit-box; display:-webkit-flex; display:flex;
  -webkit-box-pack:justify; -webkit-justify-content:space-between; justify-content:space-between;

.quote-text { font-size:18px; font-weight:300; color:rgba(255,255,255,0.92); line-height:1.55; font-style:italic; }
.quote-author { font-size:12px; color:rgba(255,255,255,0.5); margin-top:6px; letter-spacing:1px; text-transform:uppercase; }
.shuffle-btn {

.schedule-col { -webkit-box-flex:1; -webkit-flex:1; flex:1; min-width:0; overflow:hidden; }

.schedule-day-label {

.schedule-item {

function getNextBusTimes(route, count) {
  var now = new Date();
  var isWeekend = now.getDay() === 0 || now.getDay() === 6;
  var arr = isWeekend ? BUS_SCHEDULE[route].weekend : BUS_SCHEDULE[route].weekday;
  var nowMin = now.getHours() * 60 + now.getMinutes();
  var results = [];
  for (var i = 0; i < arr.length - 1; i += 2) {
    var depMin = arr[i] * 60 + arr[i+1];
    if (depMin >= nowMin && results.length < count) {
      // hours >= 24 mean next-day (e.g. 24:05 = 00:05, 25:16 = 01:16)
      var dispH = arr[i] >= 24 ? arr[i] - 24 : arr[i];
      results.push({ h: dispH, m: arr[i+1], diff: depMin - nowMin });
    }
  }
  return results;
}

function renderBusTimes(routeNum, elementId) {
  var el = document.getElementById(elementId);
  var nextEl = document.getElementById('next-' + routeNum);
  if (!el) return;

  // Filter live buses for this route
  var times = [];
  var now = new Date();
  var nowMin = now.getHours() * 60 + now.getMinutes();

  if (LIVE_BUSES && LIVE_BUSES.length > 0) {
    var nowMin = now.getHours() * 60 + now.getMinutes();
    for (var i = 0; i < LIVE_BUSES.length; i++) {
      var b = LIVE_BUSES[i];
      if (String(b.route) === String(routeNum) && times.length < 3) {
        // Recompute diff from current time using stored time string "HH:MM"
        var parts = b.time.split(':');
        var busMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        // Handle next-day wrap (e.g. bus at 00:05 when now is 23:50)
        var diff = busMin - nowMin;
        if (diff < -60) diff += 24 * 60;
        if (diff < 0) continue; // already departed
        times.push({ route: b.route, time: b.time, diff: diff, delay: b.delay || 0 });
      }
    }
  } else {
    // Fallback to static schedule
    var isWeekend = now.getDay() === 0 || now.getDay() === 6;
    var arr = isWeekend ? BUS_SCHEDULE[routeNum].weekend : BUS_SCHEDULE[routeNum].weekday;
    for (var j = 0; j < arr.length - 1; j += 2) {
      var depMin = arr[j] * 60 + arr[j+1];
      if (depMin >= nowMin && times.length < 3) {
        times.push({ route: routeNum, time: formatTime(arr[j], arr[j+1]), diff: depMin - nowMin, delay: 0 });
      }
    }
  }

  var html = '';

  if (nextEl) {
    if (times.length === 0) {
      nextEl.className = 'bus-next';
      nextEl.textContent = 'нет рейсов';
    } else {
      var first = times[0];
      var ncls = 'bus-next';
      if (first.diff <= 5) ncls += ' very-soon';
      else if (first.diff <= 15) ncls += ' soon';
      nextEl.className = ncls;
      var txt = first.diff === 0 ? 'сейчас' : 'через ' + first.diff + ' мин';
      if (first.delay && first.delay > 60) txt += ' (+' + Math.round(first.delay/60) + ')';
      nextEl.textContent = txt;
    }
  }

  if (times.length === 0) {
    html = '<span style="color:rgba(255,255,255,0.2)">—</span>';
  } else {
    for (var k = 0; k < times.length; k++) {
      var t = times[k];
      var tcls = 'bus-time';
      if (t.diff <= 5) tcls += ' very-soon';
      else if (t.diff <= 15) tcls += ' soon';
      html += '<div class="' + tcls + '"><span class="bus-hhmm">' + t.time + '</span></div>';
    }
  }
  el.innerHTML = html;
}

}

function toDateStr(date) {
  return date.getFullYear() + '-' +
    pad(date.getMonth() + 1) + '-' +
    pad(date.getDate());
}

function getEventsForDate(dateStr) {
  var result = [];
  for (var i = 0; i < ALISA_EVENTS.length; i++) {
    if (ALISA_EVENTS[i].date === dateStr) result.push(ALISA_EVENTS[i]);
  }
  // sort by start time
  result.sort(function(a, b) {
    var as = a.start || '00:00';
    var bs = b.start || '00:00';
    return as < bs ? -1 : 1;
  });
  return result;
}

ова лучше молчания.", "author": "Народная мудрость"}, {"text": "Смейся, пока можешь. Это бесплатное лекарство.", "author": "Народная мудрость"}, {"text": "Лучший способ полюбить жизнь — найти в ней смысл.", "author": "Виктор Франкл"}, {"text": "Не откладывай любовь — откладывай ненависть.", "author": "Народная мудрость"}, {"text": "Мир меняется — и мы меняемся вместе с ним.", "author": "Народная мудрость"}, {"text": "Сильный человек — не тот, кто никогда не плачет, а тот, кто умеет взять себя в руки.", "author": "Народная мудрость"}, {"text": "Нет плохой погоды — есть неподходящая одежда.", "author": "Английская пословица"}, {"text": "Ты становишься тем, о чём думаешь чаще всего.", "author": "Ральф Уолдо Эмерсон"}, {"text": "Жизнь — это эхо. Что посылаешь — то и возвращается.", "author": "Народная мудрость"}, {"text": "Расцветает тот, кто растёт.", "author": "Народная мудрость"}, {"text": "Всё великое начинается с малого.", "author": "Народная мудрость"}, {"text": "Добро, которое ты делаешь сегодня, — это инвестиция в завтра.", "author": "Народная мудрость"}, {"text": "Человеку нужен человек.", "author": "Народная мудрость"}, {"text": "Гений — это один процент вдохновения и девяносто девять процентов пота.", "author": "Томас Эдисон"}, {"text": "Будьте любопытны. Любопытство не убивало кошек — оно двигает мир.", "author": "Народная мудрость"}, {"text": "Иногда ты должен потерять себя, чтобы найти себя.", "author": "Народная мудрость"}, {"text": "Успешные люди делают то, что неуспешные делать не хотят.", "author": "Народная мудрость"}, {"text": "Порядок в доме начинается с порядка в голове.", "author": "Народная мудрость"}, {"text": "Если ты не строишь свои мечты, кто-то нанимает тебя строить свои.", "author": "Тони Гаскинс"}, {"text": "Уважение не требуют — его заслуживают.", "author": "Народная мудрость"}, {"text": "Свобода — это ответственность за свои выборы.", "author": "Народная мудрость"}, {"text": "Не жди подходящего момента — создавай его.", "author": "Народная мудрость"}, {"text": "Иметь много — не значит быть богатым.", "author": "Народная мудрость"}, {"text": "Настоящее богатство — здоровье.", "author": "Вергилий"}, {"text": "Давай другим то, что хочешь получить сам.", "author": "Народная мудрость"}, {"text": "Будь первым в своей жизни, а не вторым в чужой.", "author": "Народная мудрость"}, {"text": "Мудрость начинается с удивления.", "author": "Сократ"}, {"text": "Тот, кто читает книги, живёт много жизней.", "author": "Народная мудрость"}, {"text": "Сделай простое сложным — потеряешь всех. Сделай сложное простым — найдёшь всех.", "author": "Народная мудрость"}, {"text": "Умей говорить «нет» — это освобождает время для «да».", "author": "Народная мудрость"}, {"text": "Каждый человек — это своя вселенная.", "author": "Народная мудрость"}, {"text": "Чем больше даёшь, тем больше получаешь.", "author": "Народная мудрость"}, {"text": "Не сравнивай себя с другими — сравнивай с собой вчерашним.", "author": "Народная мудрость"}, {"text": "Благодарность — это память сердца.", "author": "Народная мудрость"}, {"text": "Уважай своё тело — оно единственное место, где тебе жить.", "author": "Джим Рон"}, {"text": "Каждая книга — это путешествие без билета.", "author": "Народная мудрость"}, {"text": "Слова имеют силу — выбирай их мудро.", "author": "Народная мудрость"}, {"text": "Дом там, где любят.", "author": "Народная мудрость"}, {"text": "Мать — самый лучший друг, которого не выбирают.", "author": "Народная мудрость"}, {"text": "Семья — это компас, который всегда указывает домой.", "author": "Народная мудрость"}, {"text": "Умный признаёт ошибки. Мудрый учится на чужих.", "author": "Народная мудрость"}, {"text": "Лучший отдых — смена деятельности.", "author": "Народная мудрость"}, {"text": "Люди забудут что ты говорил, но не забудут, как ты заставил их себя чувствовать.", "author": "Майя Энджелоу"}, {"text": "Нельзя объять необъятное — но стремиться к этому нужно.", "author": "Козьма Прутков"}, {"text": "Доверие — фундамент любых отношений.", "author": "Народная мудрость"}, {"text": "Не тот богат, у кого много, а тот, кому хватает.", "author": "Народная мудрость"}, {"text": "Улыбка — это самый короткий путь между двумя людьми.", "author": "Виктор Борг"}, {"text": "Если хочешь изменить мир — начни с себя.", "author": "Лев Толстой"}, {"text": "Правда всегда проще лжи.", "author": "Народная мудрость"}, {"text": "Красивые слова не всегда правда. Правда не всегда красивые слова.", "author": "Лао-цзы"}, {"text": "Вкладывай в людей — это самая выгодная инвестиция.", "author": "Народная мудрость"}, {"text": "Умение слушать ценнее умения говорить.", "author": "Народная мудрость"}, {"text": "Не жди, что другие прочитают твои мысли — говори.", "author": "Народная мудрость"}, {"text": "Учись у вчерашнего, живи для сегодняшнего, надейся на завтрашнее.", "author": "Альберт Эйнштейн"}, {"text": "Воображение важнее знания.", "author": "Альберт Эйнштейн"}, {"text": "Жизнь — как велосипед: чтобы не потерять равновесие, надо двигаться.", "author": "Альберт Эйнштейн"}, {"text": "Если долго смотреть в бездну, бездна начинает смотреть в тебя.", "author": "Фридрих Ницше"}, {"text": "То, что не убивает нас, делает нас сильнее.", "author": "Фридрих Ницше"}, {"text": "Человек — это то, во что он верит.", "author": "Антон Чехов"}, {"text": "Краткость — сестра таланта.", "author": "Антон Чехов"}, {"text": "В человеке всё должно быть прекрасно.", "author": "Антон Чехов"}, {"text": "Счастье — это когда тебя понимают.", "author": "Лев Толстой"}, {"text": "Все счастливые семьи похожи друг на друга, каждая несчастливая семья несчастлива по-своему.", "author": "Лев Толстой"}, {"text": "Главное — никогда не останавливаться.", "author": "Народная мудрость"}, {"text": "Не бойся быть уязвимым — это признак силы, а не слабости.", "author": "Народная мудрость"}, {"text": "Иногда лучшее, что можно сделать — просто дышать.", "author": "Народная мудрость"}, {"text": "Ключ к счастью — низкие ожидания.", "author": "Чарли Мангер"}, {"text": "Горизонт — это не конец, это приглашение.", "author": "Народная мудрость"}, {"text": "Кто не рискует — тот не ошибается. Но и не растёт.", "author": "Народная мудрость"}, {"text": "Принимай людей такими, какие они есть, а не такими, какими хочешь их видеть.", "author": "Народная мудрость"}, {"text": "Тот, кто ищет безопасности, никогда не будет свободен.", "author": "Народная мудрость"}, {"text": "Всё приходит вовремя к тому, кто умеет ждать.", "author": "Французская пословица"}, {"text": "Смирение открывает двери, которые гордость захлопывает.", "author": "Народная мудрость"}, {"text": "Счастье — это не то, что ты имеешь, а то, кем ты являешься.", "author": "Народная мудрость"}, {"text": "Не обижайся — это разрушает тебя, а не обидчика.", "author": "Народная мудрость"}, {"text": "Прощение — это дар, который ты даришь себе.", "author": "Народная мудрость"}, {"text": "Лучшее, что ты можешь сделать для других — стать лучшей версией себя.", "author": "Народная мудрость"}, {"text": "Из любой ситуации есть выход. Главное — не торопиться.", "author": "Народная мудрость"}, {"text": "Кто владеет информацией — владеет миром.", "author": "Натан Майер Ротшильд"}, {"text": "Деньги — хороший слуга, но плохой хозяин.", "author": "Народная мудрость"}, {"text": "Настоящий успех — это делать то, что любишь, с теми, кого любишь.", "author": "Народная мудрость"}, {"text": "Труд создал человека.", "author": "Фридрих Энгельс"}, {"text": "Хочешь мира — готовься к труду.", "author": "Народная мудрость"}, {"text": "Не бойся провала — бойся нежелания попробовать.", "author": "Народная мудрость"}, {"text": "Лучший момент для начала — прямо сейчас.", "author": "Народная мудрость"}, {"text": "Относись к другим так, как хочешь, чтобы относились к тебе.", "author": "Золотое правило этики"}, {"text": "Знай, когда говорить, и знай, когда молчать.", "author": "Народная мудрость"}, {"text": "Умей радоваться тому, что имеешь.", "author": "Народная мудрость"}, {"text": "Лучшая месть — это успех.", "author": "Народная мудрость"}, {"text": "Что посеешь — то и пожнёшь.", "author": "Народная мудрость"}, {"text": "Иди туда, где тебя боятся потерять.", "author": "Народная мудрость"}, {"text": "Единственная настоящая ошибка — та, из которой ты ничего не вынес.", "author": "Генри Форд"}, {"text": "Есть только один способ избежать критики: ничего не делать, ничего не говорить и быть никем.", "author": "Аристотель"}, {"text": "Хочешь изменить жизнь — измени привычки.", "author": "Народная мудрость"}, {"text": "Твоя энергия заразительна — убедись, что она стоит того, чтобы ею делиться.", "author": "Народная мудрость"}, {"text": "Каждый закат даёт нам шанс на лучший рассвет.", "author": "Народная мудрость"}];

// Random quote on each page load, cycle with button
var quoteIdx = Math.floor(Math.random() * QUOTES.length);

function showQuote() {
  var q = QUOTES[quoteIdx];
  document.getElementById('quote-text').textContent = '\u00ab' + q.text + '\u00bb';
  document.getElementById('quote-author').textContent = '\u2014\u2009' + q.author;
  showHolidays();
}

function showHolidays() {
  var today = new Date();
  var mm = String(today.getMonth() + 1);
  if (mm.length < 2) mm = '0' + mm;
  var dd = String(today.getDate());
  if (dd.length < 2) dd = '0' + dd;
  var key = mm + '-' + dd;
  var days = HOLIDAYS[key] || [];
  var el = document.getElementById('holiday-text');
  if (!el) return;
  if (days.length === 0) {
    el.style.display = 'none';
  } else {
    el.style.display = 'block';
    el.textContent = days.join('  \u00b7  ');
  }
}

function nextQuote() {
  quoteIdx = (quoteIdx + 1) % QUOTES.length;
  showQuote();
}

showQuote();

// ─── AUTO RELOAD ─────────────────────────────────────────
// Reload page every 30 minutes to pick up weather updates
setTimeout(function() {
  window.location.reload();
}, 15 * 60 * 1000);

// ─── STATUS ──────────────────────────────────────────────
function updateStatus() {
  var now = new Date();
  document.getElementById('status-time').textContent =
    'обновлено в ' + formatTime(now.getHours(), now.getMinutes());
}

setInterval(updateStatus, 5 * 60 * 1000);
updateStatus();



</script>
