<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<title>Home Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css?family=Oswald:300,400,600|Source+Sans+Pro:300,400,600|Roboto+Mono:300,400');

* {
  -webkit-box-sizing: border-box;
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #0a0c0f;
  color: #e8e8e8;
  font-family: 'Source Sans Pro', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 300;
  width: 768px;
  min-height: 1024px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── BACKGROUND TEXTURE ─── */
body:before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(30,60,90,0.4) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(20,50,40,0.3) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  padding: 28px 24px 24px;
}

/* ─── TIME & DATE ─── */
.clock-block {
  text-align: center;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 20px;
}

.clock-time {
  font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
  font-size: 96px;
  font-weight: 300;
  letter-spacing: -2px;
  color: #ffffff;
  line-height: 1;
  text-shadow: 0 0 60px rgba(100,180,255,0.2);
}

.clock-time .colon {
  opacity: 1;
  -webkit-animation: blink 1s step-end infinite;
  animation: blink 1s step-end infinite;
}

@-webkit-keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.15; }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.15; }
}

.clock-date {
  font-size: 18px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 6px;
  font-weight: 400;
}

/* ─── SECTION CARDS ─── */
.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 16px;
  -webkit-backdrop-filter: blur(10px);
}

.card-header {
  font-family: 'Oswald', Arial, sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-bottom: 14px;
}

/* ─── WEATHER ─── */
.weather-main {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  -webkit-box-pack: justify;
  -webkit-justify-content: space-between;
  justify-content: space-between;
}

.weather-temp {
  font-family: 'Oswald', Arial, sans-serif;
  font-size: 64px;
  font-weight: 300;
  color: #ffffff;
  line-height: 1;
}

.weather-temp sup {
  font-size: 28px;
  vertical-align: top;
  margin-top: 8px;
  display: inline-block;
  color: rgba(255,255,255,0.6);
}

.weather-icon {
  font-size: 56px;
  line-height: 1;
}

.weather-details {
  margin-top: 12px;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 20px;
}

.weather-detail {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
}

.weather-detail span {
  color: rgba(255,255,255,0.75);
  font-weight: 400;
}

.weather-desc {
  font-size: 16px;
  color: rgba(255,255,255,0.55);
  margin-top: 4px;
}

/* ─── HOURLY FORECAST STRIP ─── */
.forecast-strip {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.07);
  overflow: hidden;
}

.fc-slot {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  text-align: center;
}

.fc-label {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.fc-slot:first-child .fc-label {
  color: rgba(255,255,255,0.55);
  font-weight: 600;
}

.fc-icon {
  font-size: 20px;
  line-height: 1.3;
}

.fc-temp {
  font-size: 14px;
  color: rgba(255,255,255,0.8);
  margin-top: 3px;
  font-family: 'Roboto Mono', 'Courier New', monospace;
}

.fc-slot:first-child .fc-temp {
  color: #ffffff;
  font-weight: 400;
}

/* ─── BUSES ─── */
.bus-row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.bus-row:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.bus-row:first-child {
  padding-top: 0;
}

.bus-badge {
  font-family: 'Oswald', Arial, sans-serif;
  font-size: 18px;
  font-weight: 600;
  width: 52px;
  height: 32px;
  line-height: 32px;
  text-align: center;
  border-radius: 6px;
  margin-right: 14px;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}

.bus-badge.b161 {
  background: #1a4a8a;
  color: #7bb8ff;
  border: 1px solid #2a6acf;
}

.bus-badge.b312 {
  background: #1a5a3a;
  color: #5dcc88;
  border: 1px solid #2a8a5a;
}

.bus-dest {
  font-size: 15px;
  color: rgba(255,255,255,0.6);
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
}

.bus-next {
  font-size: 16px;
  color: rgba(255,255,255,0.35);
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  padding-left: 2px;
}

.bus-next.soon {
  color: #ff9444;
}

.bus-next.very-soon {
  color: #ff4444;
  font-weight: 600;
}

.bus-times {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 10px;
}

.bus-time {
  font-family: 'Roboto Mono', 'Courier New', monospace;
  color: #ffffff;
  background: rgba(255,255,255,0.08);
  padding: 5px 10px;
  border-radius: 6px;
  text-align: center;
  min-width: 88px;
}

.bus-hhmm {
  display: block;
  font-size: 17px;
  font-weight: 400;
  line-height: 1.2;
}

.bus-min {
  display: block;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  font-family: 'Source Sans Pro', Helvetica, Arial, sans-serif;
  letter-spacing: 0.3px;
  margin-top: 1px;
}

.bus-time.soon {
  color: #ff9444;
  background: rgba(255,148,68,0.12);
}

.bus-time.soon .bus-min {
  color: rgba(255,148,68,0.6);
}

.bus-time.very-soon {
  color: #ff4444;
  background: rgba(255,68,68,0.12);
}

.bus-time.very-soon .bus-min {
  color: rgba(255,68,68,0.7);
}

.bus-updated {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 10px;
  text-align: right;
}

/* ─── ALISA SCHEDULE ─── */
.schedule-today {
  margin-bottom: 6px;
}

.schedule-day-label {
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.schedule-item {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-align: start;
  -webkit-align-items: flex-start;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.schedule-item:last-child {
  border-bottom: none;
}

.schedule-item.past {
  opacity: 0.35;
}

.schedule-item.current {
  opacity: 1;
}

.schedule-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  margin-top: 6px;
  margin-right: 12px;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}

.schedule-item.current .schedule-dot {
  background: #5dcc88;
  -webkit-box-shadow: 0 0 8px rgba(93,204,136,0.6);
  box-shadow: 0 0 8px rgba(93,204,136,0.6);
}

.schedule-time {
  font-family: 'Roboto Mono', 'Courier New', monospace;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
  width: 90px;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
  padding-top: 1px;
}

.schedule-item.current .schedule-time {
  color: #5dcc88;
}

.schedule-title {
  font-size: 15px;
  color: rgba(255,255,255,0.75);
  line-height: 1.3;
}

.schedule-item.current .schedule-title {
  color: #ffffff;
  font-weight: 400;
}

.schedule-empty {
  font-size: 15px;
  color: rgba(255,255,255,0.25);
  padding: 10px 0;
  text-align: center;
}

/* tomorrow */
.schedule-tomorrow {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.schedule-tomorrow .schedule-title {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
}

.schedule-tomorrow .schedule-time {
  font-size: 12px;
}

/* ─── QUOTE ─── */
.quote-text {
  font-size: 17px;
  font-weight: 300;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  font-style: italic;
}

.quote-author {
  font-size: 13px;
  color: rgba(255,255,255,0.25);
  margin-top: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ─── STATUS DOT ─── */
.status-row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-box-pack: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-box-align: center;
  -webkit-align-items: center;
  align-items: center;
  gap: 6px;
  padding-top: 8px;
  font-size: 11px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 1px;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(93,204,136,0.5);
}
</style>
</head>
<body>
<div class="container">

  <!-- TIME & DATE -->
  <div class="clock-block">
    <div class="clock-time" id="clock-time">00<span class="colon">:</span>00</div>
    <div class="clock-date" id="clock-date">загрузка...</div>
  </div>

  <!-- WEATHER -->
  <div class="card">
    <div class="card-header">Погода · Прага</div>
    <div id="weather-content">
      <div class="weather-main">
        <div>
          <div class="weather-temp">—<sup>°C</sup></div>
          <div class="weather-desc">загрузка...</div>
        </div>
        <div class="weather-icon">🌤</div>
      </div>
      <div class="weather-details">
        <div class="weather-detail">Влажность <span id="w-humidity">—</span>%</div>
        <div class="weather-detail">Ветер <span id="w-wind">—</span> км/ч</div>
        <div class="weather-detail">Ощущается <span id="w-feels">—</span>°</div>
      </div>
    </div>
  </div>

  <!-- BUSES -->
  <div class="card">
    <div class="card-header">Автобусы · Škola Nebušice → Bořislavka</div>
    <div class="bus-row">
      <div class="bus-badge b161">161</div>
      <div class="bus-next" id="next-161">—</div>
      <div class="bus-times" id="times-161">
        <span class="bus-time">—</span>
        <span class="bus-time">—</span>
        <span class="bus-time">—</span>
      </div>
    </div>
    <div class="bus-row">
      <div class="bus-badge b312">312</div>
      <div class="bus-next" id="next-312">—</div>
      <div class="bus-times" id="times-312">
        <span class="bus-time">—</span>
        <span class="bus-time">—</span>
        <span class="bus-time">—</span>
      </div>
    </div>
    <div class="bus-updated" id="bus-updated">обновление...</div>
  </div>

  <!-- ALISA SCHEDULE -->
  <div class="card">
    <div class="card-header">Расписание · Алиса</div>
    <div class="schedule-today" id="schedule-today"></div>
    <div class="schedule-tomorrow" id="schedule-tomorrow"></div>
  </div>

  <!-- QUOTE -->
  <div class="card">
    <div class="card-header" style="display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;-webkit-box-align:center;-webkit-align-items:center;align-items:center;">
      <span>Цитата дня</span>
      <button id="quote-shuffle" onclick="nextQuote()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);font-size:18px;width:32px;height:32px;border-radius:8px;cursor:pointer;line-height:1;padding:0;">↻</button>
    </div>
    <div class="quote-text" id="quote-text">...</div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <div class="status-row">
    <div class="status-dot"></div>
    <span id="status-time">обновлено только что</span>
  </div>

</div>

<script>
// ─── UTILS ───────────────────────────────────────────────
var DAYS_RU = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
var MONTHS_RU = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function formatTime(h, m) { return pad(h) + ':' + pad(m); }

// ─── CLOCK ───────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  document.getElementById('clock-time').innerHTML =
    pad(h) + '<span class="colon">:</span>' + pad(m);
  document.getElementById('clock-date').textContent =
    DAYS_RU[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS_RU[now.getMonth()] + ' ' + now.getFullYear();
}

setInterval(updateClock, 1000);
updateClock();

// ─── WEATHER ─────────────────────────────────────────────
// wttr.in weather codes
var WMO_ICONS = {
  113:'☀️', 116:'⛅', 119:'☁️', 122:'☁️',
  143:'🌫', 248:'🌫', 260:'🌫',
  176:'🌦', 179:'🌨', 182:'🌧', 185:'🌧',
  200:'⛈', 227:'❄️', 230:'❄️',
  263:'🌦', 266:'🌦', 281:'🌧', 284:'🌧',
  293:'🌦', 296:'🌦', 299:'🌧', 302:'🌧', 305:'🌧', 308:'🌧',
  311:'🌧', 314:'🌧', 317:'🌨', 320:'🌨',
  323:'🌨', 326:'🌨', 329:'❄️', 332:'❄️', 335:'❄️', 338:'❄️',
  350:'🌧', 353:'🌦', 356:'🌧', 359:'🌧',
  362:'🌨', 365:'🌨', 368:'🌨', 371:'❄️', 374:'🌨', 377:'🌨',
  386:'⛈', 389:'⛈', 392:'⛈', 395:'❄️'
};

var WMO_DESC = {
  113:'Ясно', 116:'Переменная облачность', 119:'Облачно', 122:'Пасмурно',
  143:'Туман', 248:'Туман', 260:'Туман',
  176:'Местами дождь', 179:'Местами снег', 182:'Морось', 185:'Морось',
  200:'Гроза', 227:'Метель', 230:'Метель',
  263:'Лёгкая морось', 266:'Морось', 281:'Ледяная морось', 284:'Ледяная морось',
  293:'Небольшой дождь', 296:'Дождь', 299:'Умеренный дождь', 302:'Дождь',
  305:'Сильный дождь', 308:'Ливень', 311:'Ледяной дождь', 314:'Ледяной дождь',
  317:'Дождь со снегом', 320:'Дождь со снегом',
  323:'Небольшой снег', 326:'Снег', 329:'Умеренный снег', 332:'Снег',
  335:'Сильный снег', 338:'Снег', 350:'Ледяной дождь',
  353:'Ливень', 356:'Ливень', 359:'Ливень',
  362:'Дождь со снегом', 365:'Дождь со снегом', 368:'Снегопад', 371:'Снегопад',
  374:'Ледяной дождь', 377:'Ледяной дождь',
  386:'Гроза', 389:'Гроза с градом', 392:'Гроза со снегом', 395:'Снег с грозой'
};

function renderWeather(temp, code, wind, humidity, feels, hourlySlots) {
  var icon = WMO_ICONS[code] || '🌡';
  var desc = WMO_DESC[code] || '—';

  var forecastHtml = '';
  for (var i = 0; i < hourlySlots.length; i++) {
    var s = hourlySlots[i];
    var hIcon = WMO_ICONS[s.code] || '🌡';
    forecastHtml +=
      '<div class="fc-slot">' +
        '<div class="fc-label">' + s.label + '</div>' +
        '<div class="fc-icon">' + hIcon + '</div>' +
        '<div class="fc-temp">' + s.temp + '°</div>' +
      '</div>';
  }

  document.getElementById('weather-content').innerHTML =
    '<div class="weather-main">' +
      '<div>' +
        '<div class="weather-temp">' + temp + '<sup>°C</sup></div>' +
        '<div class="weather-desc">' + desc + '</div>' +
      '</div>' +
      '<div class="weather-icon">' + icon + '</div>' +
    '</div>' +
    '<div class="weather-details">' +
      '<div class="weather-detail">Влажность <span>' + humidity + '</span>%</div>' +
      '<div class="weather-detail">Ветер <span>' + wind + '</span> км/ч</div>' +
      '<div class="weather-detail">Ощущается <span>' + feels + '</span>°</div>' +
    '</div>' +
    '<div class="forecast-strip">' + forecastHtml + '</div>';
}

function loadWeather() {
  var xhr = new XMLHttpRequest();
  var url = 'https://wttr.in/Prague?format=j1';

  xhr.open('GET', url, true);
  xhr.timeout = 10000;

  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 0) {
      document.getElementById('weather-content').innerHTML =
        '<div class="weather-desc" style="color:rgba(255,255,255,0.3);padding:10px 0">Нет соединения</div>';
      return;
    }
    if (xhr.status !== 200) {
      document.getElementById('weather-content').innerHTML =
        '<div class="weather-desc" style="color:rgba(255,255,255,0.3);padding:10px 0">Ошибка ' + xhr.status + '</div>';
      return;
    }
    try {
      var d = JSON.parse(xhr.responseText);
      var cc = d.current_condition[0];
      var temp = cc.temp_C;
      var feels = cc.FeelsLikeC;
      var humidity = cc.humidity;
      var wind = cc.windspeedKmph;
      var code = parseInt(cc.weatherCode);

      // hourly: wttr gives 8 slots per day at 0,3,6,9,12,15,18,21h
      var now = new Date();
      var nowH = now.getHours();
      var todayHourly = d.weather[0].hourly;
      var slots = [];

      // find current and next slots
      for (var i = 0; i < todayHourly.length; i++) {
        var slotH = parseInt(todayHourly[i].time) / 100;
        if (slotH < nowH - 1) continue;
        if (slots.length >= 6) break;
        var label = slots.length === 0 ? 'Сейчас' : (slotH < 10 ? '0' + slotH : slotH) + ':00';
        slots.push({
          label: label,
          temp: todayHourly[i].tempC,
          code: parseInt(todayHourly[i].weatherCode)
        });
      }
      // fill from tomorrow if not enough
      if (slots.length < 6 && d.weather[1]) {
        var tmrHourly = d.weather[1].hourly;
        for (var j = 0; j < tmrHourly.length && slots.length < 6; j++) {
          var th = parseInt(tmrHourly[j].time) / 100;
          slots.push({
            label: (th < 10 ? '0' + th : th) + ':00',
            temp: tmrHourly[j].tempC,
            code: parseInt(tmrHourly[j].weatherCode)
          });
        }
      }

      renderWeather(temp, code, wind, humidity, feels, slots);
    } catch(e) {
      document.getElementById('weather-content').innerHTML =
        '<div class="weather-desc" style="color:rgba(255,255,255,0.3);padding:10px 0">Ошибка разбора</div>';
    }
  };

  xhr.ontimeout = function() {
    document.getElementById('weather-content').innerHTML =
      '<div class="weather-desc" style="color:rgba(255,255,255,0.3);padding:10px 0">Таймаут</div>';
  };

  xhr.onerror = function() {
    document.getElementById('weather-content').innerHTML =
      '<div class="weather-desc" style="color:rgba(255,255,255,0.3);padding:10px 0">Нет соединения</div>';
  };

  xhr.send();
}

loadWeather();

function getNextBusTimes(route, count) {
  var now = new Date();
  var isWeekend = now.getDay() === 0 || now.getDay() === 6;
  var arr = isWeekend ? BUS_SCHEDULE[route].weekend : BUS_SCHEDULE[route].weekday;
  var nowMin = now.getHours() * 60 + now.getMinutes();
  var results = [];
  for (var i = 0; i < arr.length - 1; i += 2) {
    var depMin = arr[i] * 60 + arr[i+1];
    if (depMin >= nowMin && results.length < count) {
      results.push({ h: arr[i], m: arr[i+1], diff: depMin - nowMin });
    }
  }
  return results;
}

function renderBusTimes(routeNum, elementId) {
  var times = getNextBusTimes(routeNum, 3);
  var el = document.getElementById(elementId);
  var nextEl = document.getElementById('next-' + routeNum);
  if (!el) return;
  var html = '';

  if (nextEl) {
    if (times.length === 0) {
      nextEl.className = 'bus-next';
      nextEl.textContent = 'нет рейсов';
    } else {
      var first = times[0];
      var ncls = 'bus-next';
      if (first.diff <= 5) ncls += ' very-soon';
      else if (first.diff <= 15) ncls += ' soon';
      nextEl.className = ncls;
      nextEl.textContent = first.diff === 0 ? 'сейчас' : 'через ' + first.diff + ' мин';
    }
  }

  if (times.length === 0) {
    html = '<span class="bus-time" style="color:rgba(255,255,255,0.2)">—</span>';
  } else {
    for (var i = 0; i < times.length; i++) {
      var t = times[i];
      var tcls = 'bus-time';
      if (t.diff <= 5) tcls += ' very-soon';
      else if (t.diff <= 15) tcls += ' soon';
      html += '<div class="' + tcls + '"><span class="bus-hhmm">' + formatTime(t.h, t.m) + '</span></div>';
    }
  }
  el.innerHTML = html;
}

function updateBuses() {
  renderBusTimes(161, 'times-161');
  renderBusTimes(312, 'times-312');
  var now = new Date();
  document.getElementById('bus-updated').textContent =
    'статичное расписание · ' + formatTime(now.getHours(), now.getMinutes());
}

function toDateStr(date) {
  return date.getFullYear() + '-' +
    pad(date.getMonth() + 1) + '-' +
    pad(date.getDate());
}

function getEventsForDate(dateStr) {
  var result = [];
  for (var i = 0; i < ALISA_EVENTS.length; i++) {
    if (ALISA_EVENTS[i].date === dateStr) result.push(ALISA_EVENTS[i]);
  }
  // sort by start time
  result.sort(function(a, b) {
    var as = a.start || '00:00';
    var bs = b.start || '00:00';
    return as < bs ? -1 : 1;
  });
  return result;
}

function renderSchedule() {
  var now = new Date();
  var todayStr = toDateStr(now);
  var tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
  var tomorrowStr = toDateStr(tomorrow);

  var nowMin = now.getHours() * 60 + now.getMinutes();

  // TODAY
  var todayEvents = getEventsForDate(todayStr);
  var todayEl = document.getElementById('schedule-today');
  var html = '<div class="schedule-day-label">Сегодня</div>';

  if (todayEvents.length === 0) {
    html += '<div class="schedule-empty">Нет событий</div>';
  } else {
    for (var i = 0; i < todayEvents.length; i++) {
      var ev = todayEvents[i];
      var cls = 'schedule-item';
      var timeLabel = '';

      if (ev.start) {
        var parts = ev.start.split(':');
        var evMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        var endParts = ev.end ? ev.end.split(':') : null;
        var evEnd = endParts ? parseInt(endParts[0]) * 60 + parseInt(endParts[1]) : evMin + 60;

        if (nowMin > evEnd) cls += ' past';
        else if (nowMin >= evMin) cls += ' current';

        timeLabel = ev.start + (ev.end ? '–' + ev.end : '');
      } else {
        timeLabel = 'весь день';
      }

      html += '<div class="' + cls + '">' +
        '<div class="schedule-dot"></div>' +
        '<div class="schedule-time">' + timeLabel + '</div>' +
        '<div class="schedule-title">' + ev.title + '</div>' +
        '</div>';
    }
  }
  todayEl.innerHTML = html;

  // TOMORROW
  var tomorrowEvents = getEventsForDate(tomorrowStr);
  var tomEl = document.getElementById('schedule-tomorrow');
  var thtml = '<div class="schedule-day-label">Завтра · ' +
    DAYS_RU[tomorrow.getDay()] + '</div>';

  if (tomorrowEvents.length === 0) {
    thtml += '<div class="schedule-empty">Нет событий</div>';
  } else {
    for (var j = 0; j < tomorrowEvents.length; j++) {
      var tev = tomorrowEvents[j];
      var tlabel = tev.start ? (tev.start + (tev.end ? '–' + tev.end : '')) : 'весь день';
      thtml += '<div class="schedule-item">' +
        '<div class="schedule-dot"></div>' +
        '<div class="schedule-time">' + tlabel + '</div>' +
        '<div class="schedule-title">' + tev.title + '</div>' +
        '</div>';
    }
  }
  tomEl.innerHTML = thtml;
}
